<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link href="../style/output.css" rel="stylesheet">
    <title>Fundamentos Teóricos e Conceituais</title>
</head>
<body class="bg-[#1D1B1B]">

    <header class="w-full h-[5.5rem] bg-[#2D2B2B] grid grid-cols-3 items-center px-4 mb-16 lg:mb-[8rem]">

        <button class="justify-self-start"><img src="../assets/Align left.svg" alt="ícone do menu" class="lg:ml-[3rem]"></button>
        <img src="../assets/logo.svg" alt="logo do site" class="w-[12rem] h-[3.5rem] lg:w-[20rem] lg:h-[5rem] justify-self-center">

    </header>

    <main class="px-5">

        <section>
            <h1 class="font-playfair font-bold text-white uppercase text-4xl md:text-5xl lg:text-[4rem] text-center tracking-widest leading-tight">Fundamentos Teóricos e <br> Conceituais</h1>
            <hr class="w-2/3 md:w-1/3 h-px mx-auto mt-8 md:mt-12 bg-gray-400 border-0 mb-12 lg:mb-[5rem]">
        </section>

        <section class="p-4">
            <div class="flex flex-col md:flex-row items-center bg-texture bg-linear-to-t backdrop-blur-sm rounded-[32px] w-full max-w-[83rem] h-auto md:h-[32rem] mx-auto overflow-hidden">

                <div class="flex flex-col justify-center w-full md:w-1/2 md:order-1 text-white text-center md:text-left items-center md:items-start p-8 lg:p-16">
                    <h1 class="font-lato font-extrabold uppercase text-3xl md:text-4xl lg:text-[4rem] tracking-wider text-white leading-none">MÁQUINA DE</h1>
                    <h1 class="font-lato font-extrabold uppercase text-3xl md:text-4xl lg:text-[4rem] tracking-wider text-white mt-4 lg:mt-6 mb-[2.5rem]">TURING</h1>
                    <p class="font-montserrat text-sm font-light text-gray-300 mb-10 max-w-md md:max-w-[33rem] leading-relaxed">Alan Turing propôs um modelo teórico capaz de simular qualquer processo de cálculo: a Máquina de Turing. Ela não era um computador físico, mas um conceito que mostrou que problemas complexos.</p>
                    <div class="w-full max-w-md md:max-w-[21rem] h-px bg-gray-400/50"></div>
                </div>
                
                <div class="w-full md:w-1/2 md:order-2 p-8 h-full">
                    <div class="relative w-full h-full rounded-3xl overflow-hidden border border-white/10">
                        <img src="../assets/turing machine.png" alt="Representação da Máquina de Turing" class="w-full h-full object-cover grayscale">
                        <div class="absolute inset-0 bg-black/20"></div>
                    </div>
                </div>
                
            </div>
        </section>
    </main>
</body>
</html>
